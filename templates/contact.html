    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اقترح فكرة - مبتكر الأردوينو</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="/">الرئيسية</a></li>
            <li><a href="/about">عن المشروع</a></li>
            <li><a href="/contact" class="active">اقترح فكرة</a></li>
            <li><a href="/dashboard">لوحة التحكم</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>اقترح فكرة مشروع جديد <i class="fas fa-lightbulb"></i></h1>
        <p>شاركنا أفكارك لابتكار مشاريع أردوينو جديدة وسنقوم بإضافتها للمولد!</p>

        <form action="/submit" method="POST" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="username">اسمك:</label>
                <input type="text" id="username" name="username" placeholder="أدخل اسمك الكريم" required>
            </div>

            <div class="form-group">
                <label for="email">بريدك الإلكتروني:</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label for="idea">اشرح فكرتك هنا:</label>
                <textarea id="idea" name="idea" rows="5" placeholder="اكتب وصفاً مختصراً للمشروع والقطع المستخدمة..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">إرسال الفكرة <i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - مشروع تحليل بيانات الويب</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
