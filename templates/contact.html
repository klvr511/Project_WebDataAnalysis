<h2>اقترح فكرة مشروع جديد</h2>
<form id="ideaForm" onsubmit="return validateForm()" action="/submit" method="POST">
    <input type="text" name="username" id="username" placeholder="اسمك" required>
    <input type="email" name="email" id="email" placeholder="بريدك الإلكتروني" required>
    <textarea name="idea" placeholder="اشرح فكرتك هنا..." required></textarea>
    <button type="submit">إرسال</button>
</form>
